<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pro Editor PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="sidebar">
        <h2>PDF Editor</h2>
        
        <!-- Import Bereich -->
        <div id="import-zone" class="drop-box">📄 PDF hierher ziehen (Import)</div>
        
        <hr>
        
        <!-- Umbenennen Bereich -->
        <label style="font-size: 10px;">Dateiname (Klicken zum Bearbeiten):</label>
        <input type="text" id="rename-input" placeholder="Warte auf Datei...">
        
        <hr>

        <!-- Textmarker Bereich -->
        <div class="tool-section">
            <h4>Textmarker</h4>
            <input type="text" id="marker-text" placeholder="Text eingeben..." value="HINWEIS">
            <div class="input-row">
                <label>Farbe:</label>
                <input type="color" id="marker-color" value="#ff0000">
            </div>
            <div class="input-row">
                <label>X-Pos:</label><input type="number" id="pos-x" value="50" step="10">
                <label>Y-Pos:</label><input type="number" id="pos-y" value="700" step="10">
            </div>
            <button id="add-text-btn" disabled>Text an Position einfügen</button>
        </div>

        <hr>

        <!-- Export & Share -->
        <button id="share-btn" disabled>Datei teilen / Senden</button>
        <div id="drag-zone" draggable="true" class="drop-box export-box" style="display:none;">
            🚀 Hier rausziehen (Export)
        </div>
        
        <p id="file-status" style="font-size: 10px; color: #666;">Keine Datei geladen</p>
    </div>

    <div id="resizer"></div>
    <div id="preview-container">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
