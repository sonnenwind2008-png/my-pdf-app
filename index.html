<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Toolbox Pro</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="sidebar">
        <h2 style="margin-top:0">PDF Toolbox</h2>
        
        <div id="import-zone" class="drop-box">
            <span style="font-size: 20px;">📥</span> PDF hierher ziehen
        </div>
        
        <hr>
        
        <label style="font-size: 11px; font-weight: bold;">Dateiname:</label>
        <textarea id="rename-input" rows="1" placeholder="Warte auf Datei..."></textarea>
        
        <hr>

        <div class="tool-section">
            <h4>Seiten verwalten</h4>
            <p id="page-count-info" style="font-size: 10px; margin-bottom: 5px;">Keine Datei geladen</p>
            <input type="text" id="page-selection" placeholder="z.B. 1, 3, 5-8">
            <button id="extract-pages-btn" disabled>Seiten neu zusammenstellen</button>
        </div>

        <hr>

        <div class="tool-section">
            <h4>Text hinzufügen</h4>
            <input type="text" id="marker-text" placeholder="Text..." value="HINWEIS">
            <div class="input-row">
                <label>Farbe:</label>
                <input type="color" id="marker-color" value="#ff0000">
            </div>
            <div class="input-row">
                <label>X:</label><input type="number" id="pos-x" value="50">
                <label>Y:</label><input type="number" id="pos-y" value="750">
            </div>
            <button id="add-text-btn" disabled>Text einfügen</button>
            
            <div id="added-elements-list">
                <p style="font-size: 10px; font-weight: bold; margin: 10px 0 5px 0; border-top: 1px solid #ccc; padding-top:5px;">Hinzugefügte Texte:</p>
                <div id="elements-container"></div>
            </div>
        </div>

        <hr>

        <button id="share-btn" disabled>Datei teilen / Senden</button>
        
        <div id="drag-zone" draggable="true" class="drop-box export-box" style="display:none;">
            <span style="font-size: 20px;">🚀</span> Rausziehen zum Export
        </div>
        
        <p id="file-status" style="font-size: 10px; color: #666; margin-top: auto;">Bereit.</p>
    </div>

    <div id="resizer"></div>
    <div id="preview-container">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
