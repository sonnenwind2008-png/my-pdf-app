<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pro Editor & Splitter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="sidebar">
        <h2 style="margin-top:0">PDF Toolbox</h2>
        
        <div id="import-zone" class="drop-box">
            <span style="font-size: 20px;">📥</span> PDF hierher ziehen
        </div>
        
        <hr>
        
        <label style="font-size: 11px; font-weight: bold;">Dateiname:</label>
        <input type="text" id="rename-input" placeholder="Warte auf Datei...">
        
        <hr>

        <!-- NEU: Seiten verwalten -->
        <div class="tool-section page-tool">
            <h4>Seiten verwalten</h4>
            <p id="page-count-info" style="font-size: 10px; margin-bottom: 5px;">Seiten: -</p>
            <input type="text" id="page-selection" placeholder="z.B. 1, 3, 5-8">
            <button id="extract-pages-btn" disabled>Neu zusammenstellen</button>
            <p style="font-size: 9px; color: #666; margin-top:5px;">Nur gewählte Seiten behalten.</p>
        </div>

        <hr>

        <!-- Textmarker Bereich -->
        <div class="tool-section">
            <h4>Text hinzufügen</h4>
            <input type="text" id="marker-text" placeholder="Text..." value="HINWEIS">
            <div class="input-row">
                <label>Farbe:</label>
                <input type="color" id="marker-color" value="#ff0000">
            </div>
            <div class="input-row">
                <label>X:</label><input type="number" id="pos-x" value="50">
                <label>Y:</label><input type="number" id="pos-y" value="750">
            </div>
            <button id="add-text-btn" disabled>Text einfügen</button>
        </div>

        <hr>

        <button id="share-btn" disabled>Datei teilen</button>
        
        <div id="drag-zone" draggable="true" class="drop-box export-box" style="display:none;">
            <span style="font-size: 20px;">🚀</span> Rausziehen (Export)
        </div>
        
        <p id="file-status" style="font-size: 10px; color: #666; margin-top: auto;">Keine Datei geladen</p>
    </div>

    <div id="resizer"></div>
    <div id="preview-container">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
