<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pro Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="sidebar">
        <h2 style="margin-top:0">PDF Editor</h2>
        
        <!-- Import Bereich -->
        <div id="import-zone" class="drop-box">
            <span style="font-size: 24px;">📥</span><br>
            PDF hierher ziehen
        </div>
        
        <hr>
        
        <!-- Umbenennen Bereich -->
        <label style="font-size: 11px; font-weight: bold;">Dateiname:</label>
        <input type="text" id="rename-input" placeholder="Warte auf Datei...">
        
        <hr>

        <!-- Textmarker Bereich -->
        <div class="tool-section">
            <h4>Text hinzufügen</h4>
            <input type="text" id="marker-text" placeholder="Text..." value="HINWEIS">
            <div class="input-row">
                <label>Farbe:</label>
                <input type="color" id="marker-color" value="#ff0000">
            </div>
            <div class="input-row">
                <label>X:</label><input type="number" id="pos-x" value="50">
                <label>Y:</label><input type="number" id="pos-y" value="750">
            </div>
            <p style="font-size: 9px; color: #777;">Tipp: A4 ist ca. 600x840 Einheiten.</p>
            <button id="add-text-btn" disabled>Text einfügen</button>
        </div>

        <hr>

        <!-- Export & Share -->
        <button id="share-btn" disabled>Datei teilen / Senden</button>
        
        <div id="drag-zone" draggable="true" class="drop-box export-box" style="display:none;">
            <span style="font-size: 24px;">🚀</span><br>
            Hier rausziehen (Finder/OneDrive)
        </div>
        
        <p id="file-status" style="font-size: 10px; color: #666; margin-top: auto;">Keine Datei geladen</p>
    </div>

    <div id="resizer"></div>

    <div id="preview-container">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
